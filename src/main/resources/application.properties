# Reconciliation behaviour (override with env vars documented in README)
reconciliation.strategy=exact
# exact | tolerance | priority-broker
reconciliation.price-tolerance=0.00
reconciliation.primary-broker=A

# Input feeds (relative to working directory unless absolute)
trade.feed.path.a=files/Trade_A.csv
trade.feed.path.b=files/Trade_B.csv

# Financial display / rounding for reports
financial.price.scale=2
financial.price.rounding-mode=HALF_UP
